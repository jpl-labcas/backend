version: "3.9"

services:
  backend:
    build: .
    image: labcas-backend:latest
    command: ["labcas-backend", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      LABCAS_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

